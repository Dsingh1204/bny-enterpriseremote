version: '3.8'

services:
  # Enterprise Remote Support Server
  remote-support-server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-secure-secret-key-change-in-production}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/sessions"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy with SSL (for production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - remote-support-server
    restart: unless-stopped
